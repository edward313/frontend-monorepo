

variables:
  IMAGE_NAME: phatluu313/fe-monorepo-core

  DOCKER_REPO: ${IMAGE_NAME}
  DOCKER_CACHE_IMAGE: ${DOCKER_REPO}:${CI_COMMIT_REF_NAME}
  CI_PROJECT_NAME : phatluu313/fe-monorepo-core
  APP_DEV_PORT : 3090

  
image: node:20-bullseye

stages:
  - build
  - build-image
  - deploy

variables:
  PNPM_HOME: ".pnpm"
  NODE_OPTIONS: "--max-old-space-size=4096"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pnpm/
    - .turbo/
    - node_modules/



node-build:
  image: node:20
  stage: build
  cache:
    key: node-cache
    paths:
      - .pnpm/
      - source/node_modules/
  before_script:
      - corepack enable
      - corepack prepare pnpm@10.28.1 --activate
      - pnpm config set store-dir .pnpm
  script:
    - pnpm install --frozen-lockfile
    - pnpm run build --filter starter
  artifacts:
    paths:
      - apps/starter/.next
  only:
    - dev

build-image:
  stage: build-image
  image: docker:26.1.4
  services:
    - name: docker:26.1.4-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script: []
  script:
    - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASS"
    - docker build --cache-from "${DOCKER_CACHE_IMAGE}" --tag "${DOCKER_CACHE_IMAGE}" --tag "${DOCKER_REPO}:${CI_COMMIT_SHA:0:8}" -f apps/starter/Dockerfile .
    - docker image push "${DOCKER_REPO}:${CI_COMMIT_SHA:0:8}"
    - docker image push "${DOCKER_CACHE_IMAGE}"

include:
  - "https://raw.githubusercontent.com/edward313/devops-boilerplate/dev/template/deploy.vps.gitlab-ci.yml"
