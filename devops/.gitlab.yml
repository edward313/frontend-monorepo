variables:
  IMAGE_NAME: phatluu313/fe-monorepo-core
  DOCKER_REPO: ${IMAGE_NAME}
  DOCKER_CACHE_IMAGE: ${DOCKER_REPO}:${CI_COMMIT_REF_NAME}
  CI_PROJECT_NAME: fe-monorepo-core
  APP_DEV_PORT: 3000
  PNPM_HOME: ".pnpm"
  NODE_OPTIONS: "--max-old-space-size=4096"
image: node:20-bullseye

stages:
  - build
  - build-image
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pnpm/
    - .turbo/
    - node_modules/

node-build:
  image: node:20
  stage: build
  cache:
    key: node-cache
    paths:
      - .pnpm/
      - source/node_modules/
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.28.1 --activate
    - pnpm config set store-dir .pnpm
  script:
    - pnpm install --frozen-lockfile
    - pnpm run build --filter starter
  artifacts:
    paths:
      - apps/starter/.next/standalone
      - apps/starter/.next/static
      - apps/starter/public
  only:
    - dev

build-image:
  stage: build-image
  image: docker:26.1.4
  services:
    - name: docker:26.1.4-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script: []
  needs:
    - job: node-build
      artifacts: true
  script:
    - docker login -u $REGISTRY_USER -p $REGISTRY_PASS
    - docker build --cache-from ${DOCKER_CACHE_IMAGE}
      --tag ${DOCKER_CACHE_IMAGE}
      --tag ${DOCKER_REPO}:${CI_COMMIT_SHA:0:8} -f apps/starter/Dockerfile .
    - docker image push ${DOCKER_REPO}:${CI_COMMIT_SHA:0:8}
    - docker image push ${DOCKER_CACHE_IMAGE}
deploy:
  stage: deploy
  before_script:
    - chmod 400 $MASTER_SSH_KEY
  script:
    - ssh -o StrictHostKeyChecking=no -i $MASTER_SSH_KEY ${USERNAME}@${HOST_SERVER} "sudo docker rm -f ${CI_PROJECT_NAME} || true"
    - ssh -o StrictHostKeyChecking=no -i $MASTER_SSH_KEY ${USERNAME}@${HOST_SERVER} "sudo docker rmi \$(docker images -q ${DOCKER_REPO}) || true"
    # deploy
    - ssh -o StrictHostKeyChecking=no -i $MASTER_SSH_KEY ${USERNAME}@${HOST_SERVER} "sudo docker container run -d --name ${CI_PROJECT_NAME} -p ${APP_DEV_PORT}:${APP_DEV_PORT} $IMAGE_NAME:${CI_COMMIT_SHA:0:8}"
  only:
    - dev
