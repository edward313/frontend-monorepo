deploy:
  stage: deploy
  before_script:
    - chmod 400 $MASTER_SSH_KEY
    - apt-get update -y
    - apt-get install -y openssh-client
  script:
    - |
      echo "Checking SSH connectivity to ${HOST_SERVER}..."
      if ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i "$MASTER_SSH_KEY" "${USERNAME}@${HOST_SERVER}" "echo SSH_OK"; then
        echo "SSH connected"
      else
        echo "SSH failed, verbose log:"
        ssh -vvv -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i "$MASTER_SSH_KEY" "${USERNAME}@${HOST_SERVER}" "echo SSH_OK" || true
        exit 1
      fi
  only:
    - dev

