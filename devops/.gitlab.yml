variables:
  IMAGE_NAME: phatluu313/fe-monorepo-core
  DOCKER_REPO: ${IMAGE_NAME}
  CI_PROJECT_NAME: phatluu313/fe-monorepo-core
  APP_DEV_PORT: 3090
  PNPM_HOME: ".pnpm"
  NODE_OPTIONS: "--max-old-space-size=4096"
image: node:20-bullseye

stages:
  - build
  - build-image
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pnpm/
    - .turbo/
    - node_modules/

node-build:
  image: node:20
  stage: build
  cache:
    key: node-cache
    paths:
      - .pnpm/
      - source/node_modules/
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.28.1 --activate
    - pnpm config set store-dir .pnpm
  script:
    - pnpm install --frozen-lockfile
    - pnpm run build --filter starter
  artifacts:
    paths:
      - apps/starter/.next/standalone
      - apps/starter/.next/static
      - apps/starter/public
  only:
    - dev

build-image:
  stage: build-image
  image: docker:26.1.4
  services:
    - name: docker:26.1.4-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  before_script: []
  needs:
    - job: node-build
      artifacts: true
  script:
    - until docker info; do sleep 2; done
    - echo "$REGISTRY_PASS" | docker login -u "$REGISTRY_USER" --password-stdin
    - docker build --tag "${DOCKER_REPO}:${CI_COMMIT_SHA:0:8}" -f apps/starter/Dockerfile .
    - docker image push "${DOCKER_REPO}:${CI_COMMIT_SHA:0:8}"

include:
  - "https://raw.githubusercontent.com/edward313/devops-boilerplate/dev/template/deploy.vps.gitlab-ci.yml"

# Debug SSH connectivity to the target server (manual + non-blocking)
debug-ssh:
  stage: deploy
  image: alpine:3.20
  variables:
    SSH_PORT: "22"
  before_script:
    - apk add --no-cache openssh-client bind-tools curl iproute2 netcat-openbsd
  script:
    - echo "Runner IP:"
    - ip addr show
    - echo "DNS resolution:"
    - nslookup "${SSH_HOST}"
    - echo "TCP connectivity to ${SSH_HOST}:${SSH_PORT}:"
    - nc -vz -w 5 "${SSH_HOST}" "${SSH_PORT}" || true
    - echo "SSH client debug (no auth expected):"
    - ssh -vvv -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" exit || true
  when: manual
  allow_failure: true
